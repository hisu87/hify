# ============================================================================
# Hify Documentation — zensical.toml
# ============================================================================

[project]

site_name        = "Hify"
site_description = "Self-hosted music downloader. Paste a Spotify link, get a perfectly tagged audio file — no API keys, no account, no hassle."
site_author      = "Henrique Sebastião"
site_url         = "http://hisu87.me/Hify/"
copyright        = "Copyright &copy; 2024 – 2026 Henrique Sebastião"

repo_url  = "https://github.com/hisu87/Hify"
repo_name = "hisu87/Hify"
edit_uri  = "edit/main/docs-src/docs/"

extra_css = ["stylesheets/extra.css"]

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Overview"              = "getting-started/index.md"                },
    { "Installation"          = "getting-started/installation.md"         },
    { "Docker Compose"        = "getting-started/docker-compose.md"       },
    { "One-Click Install"     = "getting-started/one-click.md"            },
    { "Environment Variables" = "getting-started/environment-variables.md"},
    { "Local Docker Build"    = "getting-started/local-docker-build.md"   },
  ]},
  { "Features" = [
    { "Overview"             = "features/index.md"                  },
    { "Download Settings"    = "features/download-settings.md"      },
    { "Playlist Monitor"     = "features/playlist-monitor.md"       },
    { "Built-in Player"      = "features/player.md"                 },
    { "M3U Export"           = "features/m3u-export.md"             },
    { "File Organization"    = "features/file-organization.md"      },
    { "Lyrics"               = "features/lyrics.md"                 },
    { "Internationalization" = "features/internationalization.md"   },
  ]},
  { "How It Works"  = "how-it-works.md"  },
  { "API Reference" = "api-reference.md" },
  { "Contributing"  = "contributing.md"  },
  { "Changelog"     = "changelog.md"     },
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]

favicon = "assets/favicon.ico"
logo    = "assets/logo.svg"

features = [
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

# Light mode (respects OS preference)
[[project.theme.palette]]
media       = "(prefers-color-scheme: light)"
scheme      = "default"
primary     = "custom"
accent      = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to dark mode"

# Dark mode (respects OS preference)
[[project.theme.palette]]
media       = "(prefers-color-scheme: dark)"
scheme      = "slate"
primary     = "custom"
accent      = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to light mode"

# ----------------------------------------------------------------------------
# Social links
# ----------------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/hisu87/Hify"
name = "GitHub"

[[project.extra.social]]
icon = "fontawesome/brands/docker"
link = "https://hub.docker.com/r/hisu87/Hify"
name = "Docker Hub"

# ----------------------------------------------------------------------------
# Markdown extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.toc]
permalink = true
title     = "On this page"

[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index     = "zensical.extensions.emoji.twemoji"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums     = true
line_spans          = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style     = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

[project.markdown_extensions.pymdownx.tilde]
