services:
  hify-hisu:
    container_name: hify-hisu
    build: .
    image: ghcr.io/hisu87/hify:latest
    restart: unless-stopped
    ports:
      - '8000:30321'
    volumes:
      - /DATA/Downloads/hify:/downloads
      - /DATA/AppData/hify/data:/data
    environment:
      - HIFY_PORT=30321
    dns:
      - 1.1.1.1
      - 1.0.0.1

x-casaos:
  architectures:
    - amd64
    - arm64
    - arm
  main: hify-hisu
  description:
    en_us: Download your Spotify playlists and songs along with album art and metadata in a self-hosted way.
  tagline:
    en_us: Self-hosted Spotify downloader (Hisu87 fork)
  developer: Hisu87
  author: Hisu87
  icon: https://raw.githubusercontent.com/hisu87/hify/main/frontend/src/assets/hify.svg
  thumbnail: ""
  title:
    en_us: Hify (Hisu87)
  category: Music
  version: 2.8.0
  port_map: "8000"
  index: /
  volumes:
    - type: bind
      target: /downloads
      description:
        en_us: Downloads folder
      source: /DATA/Downloads/hify
    - type: bind
      target: /data
      description:
        en_us: Data folder
      source: /DATA/AppData/hify/data
