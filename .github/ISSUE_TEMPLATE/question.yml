name: Question
description: Ask a question about Hify setup, usage, or configuration
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        Before opening a question, please check the [README](https://github.com/hisu87/hify#readme) and existing issues — your answer may already be there.

  - type: textarea
    id: question
    attributes:
      label: Your Question
      description: What would you like to know? Be as specific as possible.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: What Have You Already Tried?
      description: Describe what you've already attempted or read. This helps avoid repeating suggestions you've already tried.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Hify Version
      description: |
        Which version of Hify are you running? Run:
        `docker inspect hisu87/hify --format '{{index .Config.Labels "org.opencontainers.image.version"}}'`
      placeholder: "e.g. 2.5.0"
    validations:
      required: false

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment Method
      description: How are you running Hify?
      options:
        - Docker CLI (docker run)
        - Docker Compose
        - Umbrel
        - CasaOS
        - HomeDock
        - Other / not yet deployed
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any extra details, config snippets, or screenshots that might help answer your question.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I read the README and did not find the answer there.
          required: true
        - label: I searched existing issues and did not find a similar question.
          required: true
